name: Go Lint & Test

on:
  workflow_dispatch:

jobs:
  build:
    name: Lint, Vet, Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Tidy and download dependencies
        run: go mod tidy

      - name: Check formatting (gofmt)
        run: |
          test -z "$(gofmt -l .)"

      - name: Run go vet
        run: go vet ./...

      - name: Run tests
        run: go test ./...

      - name: Build
        run: go build ./cmd/fyrtaarn

