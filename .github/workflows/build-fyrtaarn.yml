name: Build Fyrtaarn

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.binary }}
    runs-on: ubuntu-24.04

    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            binary: fyrtaarn-linux-amd64
          - goos: linux
            goarch: arm64
            binary: fyrtaarn-linux-arm64
          - goos: linux
            goarch: ppc64
            binary: fyrtaarn-linux-ppc64
          - goos: linux
            goarch: sparc64
            binary: fyrtaarn-linux-sparc64
          - goos: linux
            goarch: mipsle
            gomips: softfloat
            binary: fyrtaarn-linux-mipsel
          - goos: linux
            goarch: mips64le
            gomips64: softfloat
            binary: fyrtaarn-linux-mips64el
          - goos: windows
            goarch: amd64
            binary: fyrtaarn-windows-amd64.exe
          - goos: windows
            goarch: arm64
            binary: fyrtaarn-windows-arm64.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Tidy and download dependencies
        run: go mod tidy

      - name: Build
        env:
          GOOS:        ${{ matrix.goos }}
          GOARCH:      ${{ matrix.goarch }}
          GOMIPS:      ${{ matrix.gomips }}
          GOMIPS64:    ${{ matrix.gomips64 }}
          CGO_ENABLED: 0
        run: |
          mkdir -p dist
          go build \
            -ldflags "-X main.Version=$(git describe --tags --always --dirty) \
                      -X main.Commit=$(git rev-parse --short HEAD) \
                      -X main.BuildDate=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -o dist/${{ matrix.binary }} \
            ./cmd/fyrtaarn

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.binary }}
          path: dist/${{ matrix.binary }}
