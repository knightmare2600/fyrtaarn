name: Release Fyrtaarn

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.binary }}
    runs-on: ubuntu-24.04

    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            binary: fyrtaarn-linux-amd64
          - goos: linux
            goarch: arm64
            binary: fyrtaarn-linux-arm64
          - goos: linux
            goarch: ppc64
            binary: fyrtaarn-linux-ppc64
            note: "PowerPC 64-bit big-endian (G3/G4/G5 era)"
          - goos: linux
            goarch: mipsle
            gomips: softfloat
            binary: fyrtaarn-linux-mipsel
            note: "mipsel — MIPS little-endian 32-bit, softfloat"
          - goos: linux
            goarch: mips64le
            gomips64: softfloat
            binary: fyrtaarn-linux-mips64el
            note: "mips64el — MIPS little-endian 64-bit, softfloat"
          - goos: windows
            goarch: amd64
            binary: fyrtaarn-windows-amd64.exe
          - goos: windows
            goarch: arm64
            binary: fyrtaarn-windows-arm64.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Tidy and download dependencies
        run: go mod tidy

      - name: Build
        env:
          GOOS:        ${{ matrix.goos }}
          GOARCH:      ${{ matrix.goarch }}
          GOMIPS:      ${{ matrix.gomips }}
          GOMIPS64:    ${{ matrix.gomips64 }}
          CGO_ENABLED: 0
        run: |
          mkdir -p dist
          go build \
            -ldflags "-X main.Version=${GITHUB_REF_NAME} \
                      -X main.Commit=$(git rev-parse --short HEAD) \
                      -X main.BuildDate=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -o dist/${{ matrix.binary }} \
            ./cmd/fyrtaarn

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.binary }}
          path: dist/${{ matrix.binary }}

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate SHA256 checksums
        run: |
          cd dist
          sha256sum fyrtaarn-* > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          generate_release_notes: true
          files: |
            dist/fyrtaarn-linux-amd64
            dist/fyrtaarn-linux-arm64
            dist/fyrtaarn-linux-ppc64
            dist/fyrtaarn-linux-mipsel
            dist/fyrtaarn-linux-mips64el
            dist/fyrtaarn-windows-amd64.exe
            dist/fyrtaarn-windows-arm64.exe
            dist/SHA256SUMS.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
